name: Review AI Artist

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  issues: write

jobs:
  review:
    if: ${{ github.event.action == 'opened' || github.event.label.name == 'accepted' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure union merge for CSV
        run: |
          git config --global merge.union.driver true

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: lts

      - name: Process issue
        id: review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUBMITHUB_API_KEY: ${{ secrets.SUBMITHUB_API_KEY }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          SENDER_LOGIN: ${{ github.event.sender.login }}
        run: |
          deno run --allow-read --allow-write --allow-env --allow-net .github/scripts/review.js

      - name: Commit and push changes
        if: steps.review.outputs.artist_id
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add SpotifyAiArtists.csv
          git commit -m "Add AI artist: \"${{ steps.review.outputs.artist_name }}\" (ID: ${{ steps.review.outputs.artist_id }}) fixes #${{ github.event.issue.number }}" || exit 0

          git pull --ff-only origin main || git merge origin/main
          git push origin HEAD:main
